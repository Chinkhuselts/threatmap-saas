name: CI/CD to Oracle Cloud

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chinkhuselts/cyber-threat-map

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Oracle VM via Base64 Key
        run: |
          # 1. Set up the SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 2. Decode the Base64 secret directly into the private key file
          echo "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. Add the Oracle server to known hosts
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          
          # 4. Connect and Deploy
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.HOST }} << 'EOF'
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            
            # Open Ubuntu's internal firewall for Port 80
            sudo iptables -I INPUT 6 -m state --state NEW -p tcp --dport 80 -j ACCEPT || true
            sudo netfilter-persistent save || true
            
            # Pull and run the latest Docker image
            sudo docker pull ghcr.io/chinkhuselts/cyber-threat-map:latest
            
            # Stop and remove the old container if it exists
            sudo docker stop threat-map || true
            sudo docker rm threat-map || true
            
            # Run the new container on port 80
            sudo docker run -d --name threat-map -p 3000:3000 ghcr.io/chinkhuselts/cyber-threat-map:latest
            
            # Cleanup old unused images
            sudo docker image prune -f
          EOF
