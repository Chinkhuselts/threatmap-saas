name: Deploy Threat Matrix to OCI

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 1. Navigate to your project folder on the server
            cd ~/threat-matrix
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Shut down the old containers
            sudo docker-compose down
            
            # 4. Rebuild and launch the new containers in the background
            sudo docker-compose up -d --build
            
            # 5. Clean up old unused Docker images to save disk space
            sudo docker image prune -f
